$kind: http-request
url: "{{baseUrl}}/api/api.php?endpoint=candidates&order=invalid_order"
method: GET
queryParams:
  endpoint: candidates
  order: invalid_order
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200 or 400 (not 500)", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400]);
      });

      pm.test("Response is valid JSON", function () {
          pm.response.to.be.json;
          pm.expect(pm.response.json()).to.be.an('object');
      });
    language: text/javascript
order: 7000
